name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Cache Electron binaries
        uses: actions/cache@v4
        with:
          path: |
            ~/AppData/Local/electron-builder/cache
            ~/AppData/Local/electron/Cache
          key: electron-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: electron-${{ runner.os }}-

      - run: npm ci

      - name: Crea icona base
        shell: pwsh
        run: |
          if (!(Test-Path "public/icon.ico")) {
            New-Item -ItemType Directory -Force public | Out-Null
            Add-Type -AssemblyName System.Drawing
            $bmp = New-Object System.Drawing.Bitmap 256,256
            $g   = [System.Drawing.Graphics]::FromImage($bmp)
            $g.Clear([System.Drawing.Color]::FromArgb(13,15,18))
            $pen = New-Object System.Drawing.Pen ([System.Drawing.Color]::FromArgb(232,160,32)), 12
            $g.DrawEllipse($pen, 40, 40, 176, 176)
            $g.FillEllipse([System.Drawing.Brushes]::FromArgb(232,160,32,20), 80, 80, 96, 96)
            $bmp.Save("public/icon.ico")
            $g.Dispose(); $bmp.Dispose()
          }

      - name: Build UI
        run: npx vite build

      - name: Build installer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npx electron-builder --win --publish always

      - uses: actions/upload-artifact@v4
        with:
          name: installer
          path: release/*.exe
          retention-days: 7
