<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>File Recovery Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg0:#07090d; --bg1:#0c1018; --bg2:#131924; --bg3:#192030; --bg4:#1f2840;
      --border:rgba(255,255,255,0.055); --border2:rgba(255,255,255,0.10);
      --amber:#f0a500; --amber-dim:#b87d00; --amber-bg:rgba(240,165,0,0.09); --amber-glow:rgba(240,165,0,0.22);
      --cyan:#00cce8;  --cyan-bg:rgba(0,204,232,0.08);  --cyan-glow:rgba(0,204,232,0.18);
      --green:#0fd98a; --green-bg:rgba(15,217,138,0.08); --green-glow:rgba(15,217,138,0.18);
      --purple:#a78bfa; --purple-bg:rgba(167,139,250,0.08);
      --red:#f05050;   --red-bg:rgba(240,80,80,0.08);    --red-glow:rgba(240,80,80,0.20);
      --t0:#dde4ed; --t1:#7a8898; --t2:#384252; --t3:#242e3e;
      --mono:'IBM Plex Mono',monospace; --sans:'Inter',sans-serif;
    }
    html,body,#root{width:100%;height:100%;overflow:hidden}
    body{background:var(--bg0);color:var(--t0);font-family:var(--sans);-webkit-font-smoothing:antialiased}
    ::-webkit-scrollbar{width:4px} ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:rgba(255,255,255,.07);border-radius:4px}
    button{cursor:pointer;font-family:var(--sans);border:none;background:none;color:inherit}
    input,select{font-family:var(--sans);color:inherit} *{outline:none}
    ::selection{background:rgba(240,165,0,.2);color:var(--t0)}

    @keyframes fadeIn  {from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)}}
    @keyframes fadeUp  {from{opacity:0;transform:translateY(5px)}  to{opacity:1;transform:translateY(0)}}
    @keyframes pulse   {0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.2;transform:scale(.65)}}
    @keyframes spin    {to{transform:rotate(360deg)}}
    @keyframes shimmer {from{transform:translateX(-100%)} to{transform:translateX(300%)}}
    @keyframes glow    {0%,100%{opacity:.6} 50%{opacity:1}}
    @keyframes float   {0%,100%{transform:translateY(0)} 50%{transform:translateY(-3px)}}
    @keyframes dash    {to{stroke-dashoffset:-24}}
    @keyframes borderP {0%,100%{border-color:rgba(240,165,0,.15)} 50%{border-color:rgba(240,165,0,.5)}}
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
