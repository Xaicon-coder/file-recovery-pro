<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>File Recovery Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg0:#0d0f12; --bg1:#12161c; --bg2:#1a1f28; --bg3:#20262f;
      --border:rgba(255,255,255,0.07);
      --amber:#e8a020; --amber-bg:rgba(232,160,32,0.12);
      --cyan:#00c8e0;  --cyan-bg:rgba(0,200,224,0.1);
      --green:#22c55e; --green-bg:rgba(34,197,94,0.1);
      --red:#ef4444;   --red-bg:rgba(239,68,68,0.1);
      --t0:#f0f2f5; --t1:#8b949e; --t2:#4a5568;
      --mono:'IBM Plex Mono',monospace;
      --sans:'Inter',sans-serif;
    }
    html,body,#root{width:100%;height:100%;overflow:hidden}
    body{background:var(--bg0);color:var(--t0);font-family:var(--sans);-webkit-font-smoothing:antialiased}
    ::-webkit-scrollbar{width:5px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:3px}
    button{cursor:pointer;font-family:var(--sans);border:none;background:none;color:inherit}
    input,select{font-family:var(--sans);color:inherit}
    *{outline:none}
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
